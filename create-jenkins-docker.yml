---
# =====================================================================
# PLAY 1 — Provision the EC2 server (runs against AWS from localhost)
# Same infrastructure as the other playbooks (Amazon Linux 2023)
# =====================================================================
- name: Provision Jenkins EC2 server (Docker container)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    region: eu-west-1
    key_name: jenkins-key
    instance_type: t2.medium

  tasks:
    - name: Import my SSH public key into AWS
      amazon.aws.ec2_key:
        name: "{{ key_name }}"
        region: "{{ region }}"
        key_material: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"

    - name: Create a VPC
      amazon.aws.ec2_vpc_net:
        name: jenkins-vpc-docker
        cidr_block: 10.0.0.0/16
        region: "{{ region }}"
      register: vpc

    - name: Create a public subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: 10.0.1.0/24
        region: "{{ region }}"
        map_public: true
        tags:
          Name: jenkins-subnet-docker
      register: subnet

    - name: Create an internet gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        tags:
          Name: jenkins-igw-docker
      register: igw

    - name: Create a route table sending internet traffic to the IGW
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        subnets:
          - "{{ subnet.subnet.id }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
        tags:
          Name: jenkins-rt-docker

    - name: Create security group for Jenkins
      amazon.aws.ec2_security_group:
        name: jenkins-sg-docker
        description: Security group for Jenkins container
        region: "{{ region }}"
        vpc_id: "{{ vpc.vpc.id }}"
        rules:
          - proto: tcp
            ports:
              - 22
            cidr_ip: 0.0.0.0/0
            rule_desc: Allow SSH
          - proto: tcp
            ports:
              - 8080
            cidr_ip: 0.0.0.0/0
            rule_desc: Allow Jenkins web UI
          - proto: tcp
            ports:
              - 50000
            cidr_ip: 0.0.0.0/0
            rule_desc: Allow Jenkins agent connections
      register: jenkins_sg

    - name: Find latest Amazon Linux 2023 AMI
      amazon.aws.ec2_ami_info:
        region: "{{ region }}"
        owners: amazon
        filters:
          name: "al2023-ami-2023.*-x86_64"
          state: available
      register: ami_info

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: jenkins-server-docker
        region: "{{ region }}"
        key_name: "{{ key_name }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ (ami_info.images | sort(attribute='creation_date') | last).image_id }}"
        vpc_subnet_id: "{{ subnet.subnet.id }}"
        security_groups:
          - "{{ jenkins_sg.group_id }}"
        network:
          assign_public_ip: true
        wait: true
        tags:
          Purpose: jenkins
      register: ec2

    - name: Wait for SSH to be available
      ansible.builtin.wait_for:
        host: "{{ ec2.instances[0].public_ip_address }}"
        port: 22
        delay: 10
        timeout: 120

    - name: Add new instance to in-memory inventory
      ansible.builtin.add_host:
        name: "{{ ec2.instances[0].public_ip_address }}"
        groups: jenkins_server
        ansible_user: ec2-user
        ansible_ssh_private_key_file: ~/.ssh/id_rsa
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

# =====================================================================
# PLAY 2 — Install Docker and run Jenkins as a container
# =====================================================================
- name: Run Jenkins as a Docker container
  hosts: jenkins_server
  become: true
  gather_facts: true

  tasks:
    - name: Install Docker
      ansible.builtin.dnf:
        name: docker
        state: present

    - name: Start and enable Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Install pip (not present by default on Amazon Linux 2023)
      ansible.builtin.dnf:
        name: python3-pip
        state: present

    # community.docker modules need the Docker SDK for Python on the host.
    # Pin requests<2.32: Docker SDK 7.x breaks with requests 2.32+
    # (causes "Not supported URL scheme http+docker").
    - name: Install the Docker SDK for Python (with compatible requests)
      ansible.builtin.pip:
        name:
          - docker
          - requests<2.32
        state: present
        extra_args: --ignore-installed

    - name: Run the Jenkins container
      community.docker.docker_container:
        name: jenkins
        image: jenkins/jenkins:lts
        state: started
        restart_policy: unless-stopped     # come back up after a reboot
        published_ports:
          - "8080:8080"                    # web UI
          - "50000:50000"                  # inbound agent connections
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock   # talk to host Docker daemon
          - /usr/bin/docker:/usr/bin/docker             # use host's docker binary
          - jenkins_home:/var/jenkins_home              # named volume: persist data

    # --- Verify ---
    - name: Wait until Jenkins web UI is responding
      ansible.builtin.uri:
        url: http://localhost:8080
        status_code: [200, 403]
      register: jenkins_web
      retries: 15
      delay: 10
      until: jenkins_web.status in [200, 403]

    - name: Read initial admin password from inside the container
      community.docker.docker_container_exec:
        container: jenkins
        command: cat /var/jenkins_home/secrets/initialAdminPassword
      register: admin_password
      changed_when: false

    - name: Show access details
      ansible.builtin.debug:
        msg:
          - "Jenkins (container) reachable: HTTP {{ jenkins_web.status }}"
          - "Jenkins URL: http://{{ ansible_host | default(inventory_hostname) }}:8080"
          - "Admin password: {{ admin_password.stdout }}"
