---
# =====================================================================
# PLAY 1 — Provision the EC2 server (runs against AWS from localhost)
# =====================================================================
- name: Provision Jenkins EC2 server
  hosts: localhost
  connection: local          # run on this machine, not over SSH
  gather_facts: false
  vars:
    region: eu-west-1
    key_name: jenkins-key            # label AWS uses for the key pair
    instance_type: t2.medium         # Jenkins needs ~2GB RAM; t2.micro is too small

  tasks:
    - name: Import my SSH public key into AWS
      amazon.aws.ec2_key:
        name: "{{ key_name }}"
        region: "{{ region }}"
        key_material: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"

    # --- Networking: build a reachable public network from scratch ---
    - name: Create a VPC
      amazon.aws.ec2_vpc_net:
        name: jenkins-vpc
        cidr_block: 10.0.0.0/16
        region: "{{ region }}"
      register: vpc

    - name: Create a public subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: 10.0.1.0/24
        region: "{{ region }}"
        map_public: true              # auto-assign public IPs here
        tags:
          Name: jenkins-subnet
      register: subnet

    - name: Create an internet gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        tags:
          Name: jenkins-igw
      register: igw

    - name: Create a route table sending internet traffic to the IGW
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        subnets:
          - "{{ subnet.subnet.id }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
        tags:
          Name: jenkins-rt

    - name: Create security group for Jenkins
      amazon.aws.ec2_security_group:
        name: jenkins-sg
        description: Security group for Jenkins server
        region: "{{ region }}"
        vpc_id: "{{ vpc.vpc.id }}"      # our new VPC
        rules:
          - proto: tcp
            ports:
              - 22
            cidr_ip: 0.0.0.0/0
            rule_desc: Allow SSH
          - proto: tcp
            ports:
              - 8080
            cidr_ip: 0.0.0.0/0
            rule_desc: Allow Jenkins web UI
      register: jenkins_sg

    - name: Find latest Amazon Linux 2023 AMI
      amazon.aws.ec2_ami_info:
        region: "{{ region }}"
        owners: amazon
        filters:
          name: "al2023-ami-2023.*-x86_64"
          state: available
      register: ami_info

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: jenkins-server
        region: "{{ region }}"
        key_name: "{{ key_name }}"
        instance_type: "{{ instance_type }}"
        # pick the newest matching AMI
        image_id: "{{ (ami_info.images | sort(attribute='creation_date') | last).image_id }}"
        vpc_subnet_id: "{{ subnet.subnet.id }}"
        security_groups:
          - "{{ jenkins_sg.group_id }}"   # reference by ID, not name
        network:
          assign_public_ip: true
        wait: true             # wait until the instance is running
        tags:
          Purpose: jenkins
      register: ec2

    - name: Wait for SSH to be available
      ansible.builtin.wait_for:
        host: "{{ ec2.instances[0].public_ip_address }}"
        port: 22
        delay: 10
        timeout: 120

    - name: Add new instance to in-memory inventory
      ansible.builtin.add_host:
        name: "{{ ec2.instances[0].public_ip_address }}"
        groups: jenkins_server
        ansible_user: ec2-user
        ansible_ssh_private_key_file: ~/.ssh/id_rsa
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

# =====================================================================
# PLAY 2 — Configure the server (Tasks 4-7: Jenkins, Docker, Node.js)
# =====================================================================
- name: Configure Jenkins server
  hosts: jenkins_server
  become: true               # run tasks as root
  gather_facts: true

  tasks:
    # --- Task 4: Java + Jenkins ---
    - name: Install Java 21 (Amazon Corretto) - required by current Jenkins
      ansible.builtin.dnf:
        name: java-21-amazon-corretto
        state: present

    - name: Remove Java 17 so Jenkins uses Java 21 by default
      ansible.builtin.dnf:
        name: java-17-amazon-corretto
        state: absent

    - name: Add Jenkins repository
      ansible.builtin.get_url:
        url: https://pkg.jenkins.io/redhat-stable/jenkins.repo
        dest: /etc/yum.repos.d/jenkins.repo

    - name: Import Jenkins GPG key
      ansible.builtin.rpm_key:
        state: present
        key: https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key

    - name: Install Jenkins
      ansible.builtin.dnf:
        name: jenkins
        state: present
        update_cache: true

    - name: Start and enable Jenkins
      ansible.builtin.systemd:
        name: jenkins
        state: started
        enabled: true

    # --- Task 5: Docker ---
    - name: Install Docker
      ansible.builtin.dnf:
        name: docker
        state: present

    - name: Start and enable Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Add jenkins user to the docker group
      ansible.builtin.user:
        name: jenkins
        groups: docker
        append: true          # add to docker group without removing other groups
      notify: Restart Jenkins   # restart so jenkins picks up docker group

    # --- Task 6: Node.js + npm ---
    - name: Install Node.js and npm
      ansible.builtin.dnf:
        name: nodejs       # bundles npm on Amazon Linux 2023
        state: present

    # --- Task 7: Verify ---
    - name: Check Docker version
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Check Node.js and npm versions
      ansible.builtin.command: "{{ item }}"
      register: node_versions
      changed_when: false
      loop:
        - node --version
        - npm --version

    - name: Wait until Jenkins web UI is responding
      ansible.builtin.uri:
        url: http://localhost:8080
        status_code: [200, 403]   # 403 = up but not yet unlocked; still "alive"
      register: jenkins_web
      retries: 10
      delay: 10
      until: jenkins_web.status in [200, 403]

    - name: Read initial admin password
      ansible.builtin.command: cat /var/lib/jenkins/secrets/initialAdminPassword
      register: admin_password
      changed_when: false

    - name: Show verification summary
      ansible.builtin.debug:
        msg:
          - "Docker:  {{ docker_version.stdout }}"
          - "Node:    {{ node_versions.results[0].stdout }}"
          - "npm:     {{ node_versions.results[1].stdout }}"
          - "Jenkins: reachable (HTTP {{ jenkins_web.status }})"
          - "Jenkins URL: http://{{ ansible_host | default(inventory_hostname) }}:8080"
          - "Admin password: {{ admin_password.stdout }}"

  handlers:
    - name: Restart Jenkins
      ansible.builtin.systemd:
        name: jenkins
        state: restarted
