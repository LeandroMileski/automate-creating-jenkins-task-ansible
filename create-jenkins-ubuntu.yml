---
# =====================================================================
# PLAY 1 — Provision the EC2 server (runs against AWS from localhost)
# Ubuntu version
# =====================================================================
- name: Provision Jenkins EC2 server (Ubuntu)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    region: eu-west-1
    key_name: jenkins-key
    instance_type: t2.medium

  tasks:
    - name: Import my SSH public key into AWS
      amazon.aws.ec2_key:
        name: "{{ key_name }}"
        region: "{{ region }}"
        key_material: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"

    # --- Networking: build a reachable public network from scratch ---
    - name: Create a VPC
      amazon.aws.ec2_vpc_net:
        name: jenkins-vpc-ubuntu
        cidr_block: 10.0.0.0/16
        region: "{{ region }}"
      register: vpc

    - name: Create a public subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: 10.0.1.0/24
        region: "{{ region }}"
        map_public: true
        tags:
          Name: jenkins-subnet-ubuntu
      register: subnet

    - name: Create an internet gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        tags:
          Name: jenkins-igw-ubuntu
      register: igw

    - name: Create a route table sending internet traffic to the IGW
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        subnets:
          - "{{ subnet.subnet.id }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
        tags:
          Name: jenkins-rt-ubuntu

    - name: Create security group for Jenkins
      amazon.aws.ec2_security_group:
        name: jenkins-sg-ubuntu
        description: Security group for Jenkins server
        region: "{{ region }}"
        vpc_id: "{{ vpc.vpc.id }}"
        rules:
          - proto: tcp
            ports:
              - 22
            cidr_ip: 0.0.0.0/0
            rule_desc: Allow SSH
          - proto: tcp
            ports:
              - 8080
            cidr_ip: 0.0.0.0/0
            rule_desc: Allow Jenkins web UI
      register: jenkins_sg

    - name: Find latest Ubuntu 24.04 AMI (owned by Canonical)
      amazon.aws.ec2_ami_info:
        region: "{{ region }}"
        owners: "099720109477"          # Canonical's AWS account ID
        filters:
          name: "ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-amd64-server-*"
          state: available
      register: ami_info

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: jenkins-server-ubuntu
        region: "{{ region }}"
        key_name: "{{ key_name }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ (ami_info.images | sort(attribute='creation_date') | last).image_id }}"
        vpc_subnet_id: "{{ subnet.subnet.id }}"
        security_groups:
          - "{{ jenkins_sg.group_id }}"
        network:
          assign_public_ip: true
        wait: true
        tags:
          Purpose: jenkins
      register: ec2

    - name: Wait for SSH to be available
      ansible.builtin.wait_for:
        host: "{{ ec2.instances[0].public_ip_address }}"
        port: 22
        delay: 10
        timeout: 120

    - name: Add new instance to in-memory inventory
      ansible.builtin.add_host:
        name: "{{ ec2.instances[0].public_ip_address }}"
        groups: jenkins_server
        ansible_user: ubuntu              # Ubuntu's default login user
        ansible_ssh_private_key_file: ~/.ssh/id_rsa
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

# =====================================================================
# PLAY 2 — Configure the server (Jenkins, Docker, Node.js) — Ubuntu/apt
# =====================================================================
- name: Configure Jenkins server (Ubuntu)
  hosts: jenkins_server
  become: true
  gather_facts: true

  tasks:
    # --- Java + Jenkins ---
    - name: Install Java 21 and helper packages
      ansible.builtin.apt:
        name:
          - openjdk-21-jre-headless     # Jenkins requires Java 21
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Add Jenkins GPG key (2026 key - Jenkins rotated keys in Jan 2026)
      ansible.builtin.get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /usr/share/keyrings/jenkins-keyring.asc
        force: true        # overwrite any stale key on re-runs

    - name: Add Jenkins apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
        filename: jenkins
        state: present

    - name: Install Jenkins
      ansible.builtin.apt:
        name: jenkins
        state: present
        update_cache: true

    - name: Start and enable Jenkins
      ansible.builtin.systemd:
        name: jenkins
        state: started
        enabled: true

    # --- Docker ---
    - name: Install Docker
      ansible.builtin.apt:
        name: docker.io
        state: present

    - name: Start and enable Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Add jenkins user to the docker group
      ansible.builtin.user:
        name: jenkins
        groups: docker
        append: true
      notify: Restart Jenkins

    # --- Node.js + npm ---
    - name: Install Node.js and npm
      ansible.builtin.apt:
        name:
          - nodejs       # on Ubuntu, npm is a separate package
          - npm
        state: present

    # --- Verify ---
    - name: Check Docker version
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Check Node.js and npm versions
      ansible.builtin.command: "{{ item }}"
      register: node_versions
      changed_when: false
      loop:
        - node --version
        - npm --version

    - name: Wait until Jenkins web UI is responding
      ansible.builtin.uri:
        url: http://localhost:8080
        status_code: [200, 403]
      register: jenkins_web
      retries: 10
      delay: 10
      until: jenkins_web.status in [200, 403]

    - name: Read initial admin password
      ansible.builtin.command: cat /var/lib/jenkins/secrets/initialAdminPassword
      register: admin_password
      changed_when: false

    - name: Show verification summary
      ansible.builtin.debug:
        msg:
          - "Docker:  {{ docker_version.stdout }}"
          - "Node:    {{ node_versions.results[0].stdout }}"
          - "npm:     {{ node_versions.results[1].stdout }}"
          - "Jenkins: reachable (HTTP {{ jenkins_web.status }})"
          - "Jenkins URL: http://{{ ansible_host | default(inventory_hostname) }}:8080"
          - "Admin password: {{ admin_password.stdout }}"

  handlers:
    - name: Restart Jenkins
      ansible.builtin.systemd:
        name: jenkins
        state: restarted
